version: '3.8'

services:
  # ============================================
  # SHARED SERVICES
  # ============================================
  
  redis:
    image: redis:7-alpine
    container_name: clawpack-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./shared:/shared:ro
    command: redis-server --appendonly yes
    networks:
      - clawpack-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ============================================
  # CORE AGENTS
  # ============================================

  webclaw:
    build:
      context: .
      dockerfile: docker/Dockerfile.agent
      args:
        AGENT_NAME: webclaw
    container_name: clawpack-webclaw
    ports:
      - "5000:5000"
    volumes:
      - ./shared:/app/shared
      - ./agents/webclaw:/app/agent
      - webclaw-references:/app/agent/references
    environment:
      - AGENT_NAME=webclaw
      - REDIS_URL=redis://redis:6379
      - SHARED_MEMORY_PATH=/app/shared
    networks:
      - clawpack-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  langclaw:
    build:
      context: .
      dockerfile: docker/Dockerfile.agent
      args:
        AGENT_NAME: langclaw
    container_name: clawpack-langclaw
    depends_on:
      webclaw:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared
      - ./agents/langclaw:/app/agent
      - langclaw-cache:/app/agent/tts_cache
    environment:
      - AGENT_NAME=langclaw
      - WEBCLAW_URL=http://webclaw:5000
      - REDIS_URL=redis://redis:6379
    networks:
      - clawpack-net
    stdin_open: true
    tty: true

  mathematicaclaw:
    build:
      context: .
      dockerfile: docker/Dockerfile.agent
      args:
        AGENT_NAME: mathematicaclaw
    container_name: clawpack-mathematicaclaw
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared
      - ./agents/mathematicaclaw:/app/agent
    environment:
      - AGENT_NAME=mathematicaclaw
      - REDIS_URL=redis://redis:6379
    networks:
      - clawpack-net
    stdin_open: true
    tty: true

  drawclaw:
    build:
      context: .
      dockerfile: docker/Dockerfile.agent
      args:
        AGENT_NAME: drawclaw
    container_name: clawpack-drawclaw
    depends_on:
      mathematicaclaw:
        condition: service_started
      docuclaw:
        condition: service_started
    volumes:
      - ./shared:/app/shared
      - ./agents/drawclaw:/app/agent
      - drawclaw-exports:/app/agent/exports
    environment:
      - AGENT_NAME=drawclaw
      - MATHEMATICACLAW_URL=http://mathematicaclaw:8000
      - DOCUCLAW_URL=http://docuclaw:8000
    networks:
      - clawpack-net
    stdin_open: true
    tty: true

  txclaw:
    build:
      context: .
      dockerfile: docker/Dockerfile.agent
      args:
        AGENT_NAME: txclaw
    container_name: clawpack-txclaw
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared
      - ./agents/txclaw:/app/agent
    environment:
      - AGENT_NAME=txclaw
      - REDIS_URL=redis://redis:6379
      - TX_NETWORK=mainnet
    networks:
      - clawpack-net
    stdin_open: true
    tty: true

  mediclaw:
    build:
      context: .
      dockerfile: docker/Dockerfile.agent
      args:
        AGENT_NAME: mediclaw
    container_name: clawpack-mediclaw
    depends_on:
      webclaw:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared
      - ./agents/mediclaw:/app/agent
    environment:
      - AGENT_NAME=mediclaw
      - WEBCLAW_URL=http://webclaw:5000
    networks:
      - clawpack-net

  lawclaw:
    build:
      context: .
      dockerfile: docker/Dockerfile.agent
      args:
        AGENT_NAME: lawclaw
    container_name: clawpack-lawclaw
    depends_on:
      webclaw:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared
      - ./agents/lawclaw:/app/agent
    environment:
      - AGENT_NAME=lawclaw
      - WEBCLAW_URL=http://webclaw:5000
    networks:
      - clawpack-net

  dataclaw:
    build:
      context: .
      dockerfile: docker/Dockerfile.agent
      args:
        AGENT_NAME: dataclaw
    container_name: clawpack-dataclaw
    volumes:
      - ./shared:/app/shared
      - ./agents/dataclaw:/app/agent
    environment:
      - AGENT_NAME=dataclaw
    networks:
      - clawpack-net

  docuclaw:
    build:
      context: .
      dockerfile: docker/Dockerfile.agent
      args:
        AGENT_NAME: docuclaw
    container_name: clawpack-docuclaw
    volumes:
      - ./shared:/app/shared
      - ./agents/docuclaw:/app/agent
      - docuclaw-docs:/app/agent/documents
    environment:
      - AGENT_NAME=docuclaw
    networks:
      - clawpack-net

  interpretclaw:
    build:
      context: .
      dockerfile: docker/Dockerfile.agent
      args:
        AGENT_NAME: interpretclaw
    container_name: clawpack-interpretclaw
    volumes:
      - ./shared:/app/shared
      - ./agents/interpretclaw:/app/agent
    environment:
      - AGENT_NAME=interpretclaw
    networks:
      - clawpack-net

  # ============================================
  # ORCHESTRATOR (coordinates all agents)
  # ============================================
  
  orchestrator:
    build:
      context: .
      dockerfile: docker/Dockerfile.orchestrator
    container_name: clawpack-orchestrator
    depends_on:
      webclaw:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared
      - ./docker/orchestrator:/app
    environment:
      - REDIS_URL=redis://redis:6379
      - WEBCLAW_URL=http://webclaw:5000
    networks:
      - clawpack-net
    ports:
      - "8000:8000"

networks:
  clawpack-net:
    driver: bridge

volumes:
  redis-data:
  webclaw-references:
  langclaw-cache:
  drawclaw-exports:
  docuclaw-docs:
